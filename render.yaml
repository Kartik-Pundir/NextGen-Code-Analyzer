services:
  - type: web
    name: nextgen-code-analyzer-api
    env: node
    region: oregon
    buildCommand: cd server && npm install
    startCommand: cd server && node index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: AI_API_KEY
        sync: false
